<!DOCTYPE html>
<html lang="id">

<body class="bg-gray-100 min-h-screen">

    <!-- Header -->

    <main class="container mx-auto p-4 mt-6">

            <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Login Sistem</h2>
            <input type="text" id="username" placeholder="Username" class="w-full p-3 mb-4 border rounded-lg">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 mb-4 border rounded-lg">
            
            <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">MASUK</button>
            
            <button onclick="lupaPassword()" class="w-full mt-4 text-sm text-blue-500 hover:underline">
                Lupa Password?

        </div>

        <!-- Section Menu Utama (Hidden Default) -->

            <h2 class="text-2xl font-bold mb-6 text-center">MENU UTAMA</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <button onclick="alert('Membuka Pembukuan Bisnis Playground...')" class="bg-yellow-600 text-white p-6 rounded-lg text-lg font-bold">3. PEMBUKUAN BISNIS PLAYGROUND</button>
                <button onclick="alert('Membuka Pembukuan Bisnis Raisya Decoration...')" class="bg-pink-600 text-white p-6 rounded-lg text-lg font-bold">4. PEMBUKUAN BISNIS RAISYA DECORATION</button>
                <button onclick="alert('Membuka Pembukuan Bisnis Internet...')" class="bg-purple-600 text-white p-6 rounded-lg text-lg font-bold">5. PEMBUKUAN BISNIS INTERNET</button>
                <button onclick="alert('Membuka Rekapitulasi...')" class="bg-gray-800 text-white p-6 rounded-lg text-lg font-bold">6. REKAPITULASI ALL PEMBUKUAN</button>
            </div>
            <button onclick="location.reload()" class="mt-6 w-full bg-gray-300 py-2 rounded">Keluar / Logout</button>
        </div>
    </main>
