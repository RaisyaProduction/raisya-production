<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAISYA DECORATION SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="bg-blue-800 text-white p-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold">RAISYA DECORATION</h1>
    </header>

    <main class="container mx-auto p-4 mt-6">
        <div id="login-container" class="max-w-sm mx-auto bg-white p-8 rounded-xl shadow-xl">
            <h2 class="text-2xl font-bold mb-6 text-center">Login Sistem</h2>
            <input type="text" id="username" placeholder="Username" class="w-full p-3 mb-4 border rounded-lg">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 mb-4 border rounded-lg">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">MASUK</button>
            <button onclick="lupaPassword()" class="w-full mt-4 text-sm text-blue-500 hover:underline">Lupa Password?</button>
        </div>

        <div id="main-menu" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-center">PILIH MENU PEMBUKUAN</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="bukaModul('KEUANGAN KELUARGA')" class="bg-green-600 text-white p-6 rounded-lg font-bold">1. PEMBUKUAN KELUARGA</button>
                <button onclick="bukaModul('BISNIS RUMAH HANTU')" class="bg-red-600 text-white p-6 rounded-lg font-bold">2. BISNIS RUMAH HANTU</button>
                <button onclick="bukaModul('BISNIS PLAYGROUND')" class="bg-yellow-600 text-white p-6 rounded-lg font-bold">3. BISNIS PLAYGROUND</button>
                <button onclick="bukaModul('RAISYA DECORATION')" class="bg-pink-600 text-white p-6 rounded-lg font-bold">4. RAISYA DECORATION</button>
                <button onclick="bukaModul('BISNIS INTERNET')" class="bg-purple-600 text-white p-6 rounded-lg font-bold">5. BISNIS INTERNET</button>
                <button onclick="bukaModul('REKAPITULASI')" class="bg-gray-800 text-white p-6 rounded-lg font-bold">6. REKAPITULASI ALL</button>
            </div>
            <button onclick="location.reload()" class="mt-8 w-full bg-red-500 text-white py-2 rounded">Log Out</button>
        </div>
    </main>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const users = {"Radhika":"002886", "Suami/Istri":"002886", "RumahHantu":"002886", "Playground":"002886", "RaisyaDecoration":"002886", "Internet":"002886"};

            if (users[user] && users[user] === pass) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('main-menu').classList.remove('hidden');
            } else {
                alert("Username atau Password Salah!");
            }
        }

        function bukaModul(nama) {
            alert("Anda sedang mengakses: " + nama + "\n\nCatatan: Fitur Input/Edit/Hapus akan segera diaktifkan pada update berikutnya.");
        }

        function lupaPassword() {
            const input = prompt("Konfirmasi Email/HP Anda:");
            if (input === "dedesugiono.ai@gmail.com" || input === "081220285226") {
                const newPass = prompt("Verifikasi Sukses. Masukkan password baru:");
                if (newPass) alert("Password berhasil diubah!");
            } else {
                alert("Data tidak valid. Silakan hubungi admin.");
            }
        }
    </script>
</body>
</html>
