<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. ADHIKARYA BINTANG MANDIRI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 p-4">

<div id="app" class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-xl font-bold text-center mb-6">PT. ADHIKARYA BINTANG MANDIRI</h1>

    <div id="login-form">
        <input type="text" id="username" placeholder="Username" class="border p-2 w-full mb-2">
        <input type="password" id="password" placeholder="Password" class="border p-2 w-full mb-2">
        <button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded">Login</button>
        <p class="text-xs text-gray-500 mt-4 text-center">Lupa Password? Hubungi: 081220285226</p>
    </div>

    <div id="menu-utama" class="hidden">
        <h2 class="text-lg font-semibold mb-4">Pilih Pembukuan:</h2>
        <div class="grid grid-cols-1 gap-2">
            <button onclick="pilihMenu('Keluarga')" class="bg-indigo-600 text-white p-3 rounded">1. PEMBUKUAN KELUARGA</button>
            <button onclick="pilihMenu('RumahHantu')" class="bg-red-600 text-white p-3 rounded">2. BISNIS RUMAH HANTU</button>
            <button onclick="pilihMenu('Playground')" class="bg-yellow-600 text-white p-3 rounded">3. BISNIS PLAYGROUND</button>
            <button onclick="pilihMenu('Raisya')" class="bg-pink-600 text-white p-3 rounded">4. RAISYA DECORATION</button>
            <button onclick="pilihMenu('Internet')" class="bg-green-600 text-white p-3 rounded">5. BISNIS INTERNET</button>
        </div>
    </div>

    <div id="area-kerja" class="hidden">
        <button onclick="location.reload()" class="text-sm text-blue-500 mb-4">← Kembali ke Menu</button>
        <h2 id="judul-modul" class="text-xl font-bold mb-4"></h2>
        
        <div class="bg-gray-50 p-4 rounded border">
            <input type="text" id="in-nama" placeholder="Nama Transaksi" class="border p-1 w-full mb-1">
            <input type="number" id="in-jumlah" placeholder="Jumlah" class="border p-1 w-full mb-1">
            <input type="text" id="in-ket" placeholder="Keterangan" class="border p-1 w-full mb-2">
            <button onclick="simpanData()" class="bg-green-600 text-white px-4 py-2 rounded w-full">Simpan Data</button>
        </div>

        <table class="w-full mt-6 border-collapse border">
            <thead><tr class="bg-gray-200"><th class="border p-2">Nama</th><th class="border p-2">Jumlah</th></tr></thead>
            <tbody id="tabel-data"></tbody>
        </table>
        <button onclick="downloadExcel()" class="mt-4 bg-gray-800 text-white w-full py-2 rounded">Download Excel</button>
    </div>
</div>

<script>
    let data = [];
    
    function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if (p === '002886') {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('menu-utama').classList.remove('hidden');
        } else {
            alert('Password Salah!');
        }
    }

    function pilihMenu(nama) {
        document.getElementById('menu-utama').classList.add('hidden');
        document.getElementById('area-kerja').classList.remove('hidden');
        document.getElementById('judul-modul').innerText = "Pembukuan: " + nama;
    }

    function simpanData() {
        const nama = document.getElementById('in-nama').value;
        const jml = document.getElementById('in-jumlah').value;
        data.push({ Nama: nama, Jumlah: jml });
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tabel-data');
        tbody.innerHTML = data.map(item => `<tr><td class="border p-2">${item.Nama}</td><td class="border p-2">${item.Jumlah}</td></tr>`).join('');
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Laporan");
        XLSX.writeFile(wb, "Laporan_Keuangan.xlsx");
    }
</script>
</body>
</html>
