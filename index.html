<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAISYA PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-md mx-auto p-4">
        
        <header class="text-center my-6">
            <h1 class="text-3xl font-black text-indigo-700 tracking-wider">RAISYA PRODUCTION</h1>
            <p class="text-gray-500 text-sm">Sistem Manajemen Pembukuan Terintegrasi</p>
        </header>

        <div id="auth-section" class="bg-white p-6 rounded-2xl shadow-md">
            <div class="flex border-b mb-4">
                <button onclick="switchTab('login')" id="tab-login" class="w-1/3 pb-2 text-center border-b-2 border-indigo-600 font-bold text-indigo-600">Login</button>
                <button onclick="switchTab('daftar')" id="tab-daftar" class="w-1/3 pb-2 text-center border-b-2 border-transparent text-gray-500">Daftar</button>
                <button onclick="switchTab('lupa')" id="tab-lupa" class="w-1/3 pb-2 text-center border-b-2 border-transparent text-gray-400 text-xs flex items-center justify-center">Lupa Pass</button>
            </div>

            <div id="panel-login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="login-username" placeholder="Keluarga / RumahHantu / dll" class="mt-1 block w-full p-2.5 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="login-password" placeholder="•••••" class="mt-1 block w-full p-2.5 border rounded-lg">
                </div>
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition">Masuk Menu Utama</button>
            </div>

            <div id="panel-daftar" class="space-y-4 hidden">
                <p class="text-sm text-amber-600 bg-amber-50 p-2 rounded">⚠️ Mode Demo: Silahkan gunakan akun default untuk masuk.</p>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username Baru</label>
                    <input type="text" class="mt-1 block w-full p-2.5 border rounded-lg bg-gray-50" readonly placeholder="Keluarga/RumahHantu/dll">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email / No. HP</label>
                    <input type="text" class="mt-1 block w-full p-2.5 border rounded-lg bg-gray-50" placeholder="raisyaproduction@email.com">
                </div>
                <button onclick="alert('Pendaftaran berhasil (Simulasi)! Silahkan login menggunakan username resmi dan password 002886.')" class="w-full bg-indigo-600 text-white p-2.5 rounded-lg font-semibold hover:bg-indigo-700">Daftar Sekarang</button>
            </div>

            <div id="panel-lupa" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Konfirmasi Email / HP</label>
                    <input type="text" placeholder="Masukkan Email atau No HP terdaftar" class="mt-1 block w-full p-2.5 border rounded-lg">
                </div>
                <button onclick="alert('Kode verifikasi pemulihan sandi telah dikirim!')" class="w-full bg-indigo-600 text-white p-2.5 rounded-lg font-semibold hover:bg-indigo-700">Konfirmasi & Kirim Kode</button>
            </div>
        </div>

        <div id="main-menu-section" class="hidden space-y-6">
            <div class="bg-indigo-900 text-white p-4 rounded-xl flex justify-between items-center shadow-lg">
                <div>
                    <p class="text-xs text-indigo-200">Akses Terbuka:</p>
                    <h2 id="menu-title" class="font-bold text-sm tracking-wide">PEMBUKUAN</h2>
                </div>
                <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-600 text-white text-xs px-3 py-1.5 rounded-md font-medium transition">Log Out</button>
            </div>

            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-green-50 p-3 rounded-xl border border-green-200">
                    <p class="text-[10px] uppercase font-bold text-green-600">Masuk</p>
                    <p id="stat-masuk" class="text-xs font-bold text-green-700 mt-1">Rp 0</p>
                </div>
                <div class="bg-red-50 p-3 rounded-xl border border-red-200">
                    <p class="text-[10px] uppercase font-bold text-red-600">Keluar</p>
                    <p id="stat-keluar" class="text-xs font-bold text-red-700 mt-1">Rp 0</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-200">
                    <p class="text-[10px] uppercase font-bold text-blue-600">Saldo</p>
                    <p id="stat-saldo" class="text-xs font-bold text-blue-700 mt-1">Rp 0</p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border">
                <h3 class="font-bold text-gray-800 mb-3 text-sm flex items-center">➕ Input Anggaran Baru</h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-500">Jenis Anggaran</label>
                        <select id="trans-type" class="mt-1 block w-full p-2 border rounded-lg text-sm">
                            <option value="Masuk">Anggaran Masuk (Pendapatan)</option>
                            <option value="Keluar">Anggaran Keluar (Pengeluaran)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500">Keterangan / Keperluan</label>
                        <input type="text" id="trans-desc" placeholder="Contoh: Tiket, Gaji, Operasional" class="mt-1 block w-full p-2 border rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500">Jumlah Uang (Rp)</label>
                        <input type="number" id="trans-amount" placeholder="0" class="mt-1 block w-full p-2 border rounded-lg text-sm">
                    </div>
                    <button onclick="addTransaction()" class="w-full bg-emerald-600 text-white p-2 rounded-lg font-medium text-sm hover:bg-emerald-700 transition">Simpan Anggaran</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border">
                <h3 class="font-bold text-gray-800 mb-3 text-sm">📊 Riwayat Transaksi</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead>
                            <tr class="border-b bg-gray-50 text-gray-500 uppercase tracking-wider">
                                <th class="p-2">Tipe</th>
                                <th class="p-2">Keterangan</th>
                                <th class="p-2 text-right">Jumlah</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-table-body" class="divide-y">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Mapping User ke Menu Utama
        const menuMapping = {
            "Keluarga": "1. PEMBUKUAN KEUANGAN KELUARGA",
            "RumahHantu": "2. PEMBUKUAN BISNIS RUMAH HANTU",
            "Playground": "3. PEMBUKUAN BISNIS PLAYGROUND ANAK",
            "RaisyaDecoration": "4. PEMBUKUAN BISNIS RAISYA DECORATION",
            "Internet": "5. PEMBUKUAN BISNIS INTERNET"
        };

        // Database Browser (LocalStorage) agar data awet & terpisah per divisi
        let database = JSON.parse(localStorage.getItem('raisya_pembukuan')) || {
            Keluarga: [], RumahHantu: [], Playground: [], RaisyaDecoration: [], Internet: []
        };

        let currentUser = null;

        // Fungsi Ganti Tab (Login/Daftar/Lupa)
        function switchTab(tab) {
            const panels = ['login', 'daftar', 'lupa'];
            panels.forEach(p => {
                document.getElementById(`panel-${p}`).classList.add('hidden');
                document.getElementById(`tab-${p}`).className = "w-1/3 pb-2 text-center border-b-2 border-transparent text-gray-500 text-sm";
            });
            document.getElementById(`panel-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = "w-1/3 pb-2 text-center border-b-2 border-indigo-600 font-bold text-indigo-600 text-sm";
        }

        // Proses Validasi Login
        function handleLogin() {
            const userIn = document.getElementById('login-username').value.trim();
            const passIn = document.getElementById('login-password').value;

            if (menuMapping[userIn] && passIn === "002886") {
                currentUser = userIn;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-menu-section').classList.remove('hidden');
                document.getElementById('menu-title').innerText = menuMapping[currentUser];
                updateDashboard();
            } else {
                alert("Username atau Password salah! \n\nGunakan Username resmi (Contoh: Keluarga) dengan Password: 002886");
            }
        }

        // Proses Logout
        function handleLogout() {
            currentUser = null;
            document.getElementById('login-username').value = "";
            document.getElementById('login-password').value = "";
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-menu-section').classList.add('hidden');
        }

        // Tambah Anggaran Masuk/Keluar
        function addTransaction() {
            const type = document.getElementById('trans-type').value;
            const desc = document.getElementById('trans-desc').value.trim();
            const amount = parseInt(document.getElementById('trans-amount').value);

            if (!desc || isNaN(amount) || amount <= 0) {
                alert("Mohon isi keterangan dan nominal uang dengan benar!");
                return;
            }

            // Simpan ke database local browser
            database[currentUser].push({ type, desc, amount });
            localStorage.setItem('raisya_pembukuan', JSON.stringify(database));

            // Reset Form Input
            document.getElementById('trans-desc').value = "";
            document.getElementById('trans-amount').value = "";

            updateDashboard();
        }

        // Kalkulasi & Render Tampilan Laporan
        function updateDashboard() {
            const transactions = database[currentUser] || [];
            const tbody = document.getElementById('transaction-table-body');
            tbody.innerHTML = "";

            let totalMasuk = 0;
            let totalKeluar = 0;

            transactions.forEach(t => {
                if (t.type === 'Masuk') totalMasuk += t.amount;
                if (t.type === 'Keluar') totalKeluar += t.amount;

                const row = document.createElement('tr');
                const badgeColor = t.type === 'Masuk' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
                
                row.innerHTML = `
                    <td class="p-2"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${badgeColor}">${t.type}</span></td>
                    <td class="p-2 font-medium text-gray-700">${t.desc}</td>
                    <td class="p-2 text-right font-bold ${t.type === 'Masuk' ? 'text-green-600' : 'text-red-600'}">Rp ${t.amount.toLocaleString('id-ID')}</td>
                `;
                tbody.appendChild(row);
            });

            if (transactions.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center p-4 text-gray-400 italic">Belum ada rincian anggaran</td></tr>`;
            }

            // Update Kartu Angka Ringkasan
            document.getElementById('stat-masuk').innerText = `Rp ${totalMasuk.toLocaleString('id-ID')}`;
            document.getElementById('stat-keluar').innerText = `Rp ${totalKeluar.toLocaleString('id-ID')}`;
            document.getElementById('stat-saldo').innerText = `Rp ${(totalMasuk - totalKeluar).toLocaleString('id-ID')}`;
        }
    </script>
</body>
</html>
