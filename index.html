<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>RAISYA DECORATION - Sistem Pembukuan</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; }
        .btn-action { background-color: #28a745; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <div id="app" class="card">
        <h1>RAISYA DECORATION</h1>
        <div id="login-section">
            <h3>Login Sistem</h3>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-action" onclick="checkLogin()">Masuk</button>
            <p><small>Lupa Password? Hubungi: dedesugiono.ai@gmail.com / 081220285226</small></p>
        </div>

        <div id="menu-utama" style="display:none;">
            <h2>Menu Utama</h2>
            <ul>
                <li><button onclick="goTo('keluarga')">1. Pembukuan Keluarga</button></li>
                <li><button onclick="goTo('rumah-hantu')">2. Bisnis Rumah Hantu</button></li>
                <li><button onclick="goTo('playground')">3. Bisnis Playground</button></li>
                <li><button onclick="goTo('decoration')">4. Raisya Decoration</button></li>
                <li><button onclick="goTo('internet')">5. Bisnis Internet</button></li>
                <li><button onclick="goTo('rekap')">6. Rekapitulasi All</button></li>
            </ul>
        </div>
    </div>

    <script>
        const credentials = {
            "Radhika": "002886",
            "Suami": "002886",
            "Istri": "002886",
            "RumahHantu": "002886",
            "RaisyaDecoration": "002886",
            "Internet": "002886"
        };

        function checkLogin() {
            let u = document.getElementById('username').value;
            let p = document.getElementById('password').value;
            if (credentials[u] === p) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('menu-utama').style.display = 'block';
            } else {
                alert("Login Gagal!");
            }
        }

        function goTo(menu) {
            alert("Arahkan ke modul: " + menu);
            // Logika navigasi antar modul di sini
        }
    </script>
</body>
</html>
