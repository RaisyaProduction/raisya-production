<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAISYA DECORATION</title>
    <!-- Menggunakan Tailwind CSS untuk tampilan yang modern dan premium -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans antialiased text-slate-800 selection:bg-rose-500 selection:text-white">

    <!-- ================= CARD UTAMA ================= -->
    <div class="w-full max-w-md mx-4 bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden transition-all duration-300">
        
        <!-- HEADER APLIKASI -->
        <div class="bg-gradient-to-br from-rose-500 to-pink-600 p-8 text-center text-white relative">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
            <h1 class="text-3xl font-extrabold tracking-wider uppercase drop-shadow-md">Raisya Decoration</h1>
            <p id="app-subtitle" class="text-rose-100 text-sm mt-2 font-medium">Sistem Manajemen Laporan & Bisnis</p>
        </div>

        <div class="p-8">
            <!-- 1. HALAMAN LOGIN -->
            <div id="page-login" class="space-y-5">
                <div class="text-center mb-2">
                    <h2 class="text-xl font-bold text-slate-700">Selamat Datang Kembali</h2>
                    <p class="text-slate-400 text-sm">Silakan masuk untuk mengakses menu utama</p>
                </div>
                
                <div id="login-error" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-xl border border-red-200 text-center font-medium"></div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Username</label>
                        <input type="text" id="login-user" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all text-sm" placeholder="Masukkan username">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Password</label>
                        <input type="password" id="login-pass" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all text-sm" placeholder="••••••••">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Kata-Kata Kunci</label>
                        <input type="text" id="login-words" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all text-sm" placeholder="Masukkan kata kunci">
                    </div>
                </div>

                <button onclick="handleLogin()" class="w-full mt-2 bg-gradient-to-r from-rose-500 to-pink-600 hover:from-rose-600 hover:to-pink-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md shadow-rose-500/20 active:scale-[0.98] transition-all cursor-pointer">
                    Masuk ke Sistem
                </button>

                <div class="text-center pt-2">
                    <button onclick="switchPage('page-forgot')" class="text-sm font-medium text-rose-500 hover:text-rose-600 cursor-pointer">Lupa Password?</button>
                </div>
            </div>

            <!-- 2. HALAMAN LUPA PASSWORD -->
            <div id="page-forgot" class="hidden space-y-5">
                <div class="text-center mb-2">
                    <h2 class="text-xl font-bold text-slate-700">Konfirmasi Identitas</h2>
                    <p class="text-slate-400 text-sm">Masukkan Email atau Nomor HP yang terdaftar</p>
                </div>

                <div id="forgot-error" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-xl border border-red-200 text-center font-medium"></div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Email / No. HP</label>
                    <input type="text" id="forgot-input" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all text-sm" placeholder="dedesugiono.ai@gmail.com atau 081220285226">
                </div>

                <div class="flex space-x-3 pt-2">
                    <button onclick="switchPage('page-login')" class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 px-4 rounded-xl transition-all cursor-pointer text-sm">
                        Batal
                    </button>
                    <button onclick="handleForgot()" class="w-2/3 bg-rose-500 hover:bg-rose-600 text-white font-semibold py-3 px-4 rounded-xl shadow-md shadow-rose-500/10 active:scale-[0.98] transition-all cursor-pointer text-sm">
                        Konfirmasi
                    </button>
                </div>
            </div>

            <!-- 3. HALAMAN BUAT PASSWORD BARU -->
            <div id="page-reset" class="hidden space-y-5">
                <div class="text-center mb-2">
                    <h2 class="text-xl font-bold text-slate-700">Buat Password Baru</h2>
                    <p class="text-slate-400 text-sm">Demi keamanan, silakan ganti password lama Anda</p>
                </div>

                <div id="reset-error" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-xl border border-red-200 text-center font-medium"></div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Password Baru</label>
                    <input type="password" id="reset-pass" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all text-sm" placeholder="Masukkan password baru">
                </div>

                <button onclick="handleReset()" class="w-full mt-2 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 px-4 rounded-xl shadow-md shadow-emerald-500/20 active:scale-[0.98] transition-all cursor-pointer">
                    Simpan Password Baru
                </button>
            </div>

            <!-- 4. HALAMAN MENU UTAMA -->
            <div id="page-menu" class="hidden space-y-6">
                <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                    <div>
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">User Aktif</span>
                        <h2 class="text-lg font-bold text-slate-700 flex items-center gap-1.5">
                            <i class="fa-solid fa-circle-user text-rose-500"></i> Radhika
                        </h2>
                    </div>
                    <button onclick="handleLogout()" class="text-xs font-semibold bg-slate-100 hover:bg-red-50 hover:text-red-600 text-slate-500 px-3 py-2 rounded-lg transition-all cursor-pointer">
                        <i class="fa-solid fa-right-from-bracket mr-1"></i> Keluar
                    </button>
                </div>

                <!-- DAFTAR MENU -->
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="selectMenu('LAPORAN KEUANGAN KELUARGA')" class="group flex items-center p-4 bg-slate-50 hover:bg-rose-50/50 border border-slate-200/60 hover:border-rose-200 rounded-2xl transition-all text-left cursor-pointer">
                        <div class="w-10 h-10 rounded-xl bg-blue-500/10 text-blue-600 flex items-center justify-center font-bold text-sm group-hover:scale-110 transition-transform">1</div>
                        <div class="ml-4 font-semibold text-slate-700 group-hover:text-rose-600 text-sm tracking-wide">LAPORAN KEUANGAN KELUARGA</div>
                        <i class="fa-solid fa-chevron-right ml-auto text-slate-300 group-hover:text-rose-400 transition-colors text-xs"></i>
                    </button>

                    <button onclick="selectMenu('LAPORAN BISNIS RUMAH HANTU')" class="group flex items-center p-4 bg-slate-50 hover:bg-rose-50/50 border border-slate-200/60 hover:border-rose-200 rounded-2xl transition-all text-left cursor-pointer">
                        <div class="w-10 h-10 rounded-xl bg-purple-500/10 text-purple-600 flex items-center justify-center font-bold text-sm group-hover:scale-110 transition-transform">2</div>
                        <div class="ml-4 font-semibold text-slate-700 group-hover:text-rose-600 text-sm tracking-wide">LAPORAN BISNIS RUMAH HANTU</div>
                        <i class="fa-solid fa-chevron-right ml-auto text-slate-300 group-hover:text-rose-400 transition-colors text-xs"></i>
                    </button>

                    <button onclick="selectMenu('LAPORAN BISNIS PLAYGROUND')" class="group flex items-center p-4 bg-slate-50 hover:bg-rose-50/50 border border-slate-200/60 hover:border-rose-200 rounded-2xl transition-all text-left cursor-pointer">
                        <div class="w-10 h-10 rounded-xl bg-amber-500/10 text-amber-600 flex items-center justify-center font-bold text-sm group-hover:scale-110 transition-transform">3</div>
                        <div class="ml-4 font-semibold text-slate-700 group-hover:text-rose-600 text-sm tracking-wide">LAPORAN BISNIS PLAYGROUND</div>
                        <i class="fa-solid fa-chevron-right ml-auto text-slate-300 group-hover:text-rose-400 transition-colors text-xs"></i>
                    </button>

                    <button onclick="selectMenu('LAPORAN BISNIS RAISYA DECORATION')" class="group flex items-center p-4 bg-slate-50 hover:bg-rose-50/50 border border-slate-200/60 hover:border-rose-200 rounded-2xl transition-all text-left cursor-pointer">
                        <div class="w-10 h-10 rounded-xl bg-rose-500/10 text-rose-600 flex items-center justify-center font-bold text-sm group-hover:scale-110 transition-transform">4</div>
                        <div class="ml-4 font-semibold text-slate-700 group-hover:text-rose-600 text-sm tracking-wide">LAPORAN BISNIS RAISYA DECORATION</div>
                        <i class="fa-solid fa-chevron-right ml-auto text-slate-300 group-hover:text-rose-400 transition-colors text-xs"></i>
                    </button>

                    <button onclick="selectMenu('LAPORAN BISNIS INTERNAT')" class="group flex items-center p-4 bg-slate-50 hover:bg-rose-50/50 border border-slate-200/60 hover:border-rose-200 rounded-2xl transition-all text-left cursor-pointer">
                        <div class="w-10 h-10 rounded-xl bg-cyan-500/10 text-cyan-600 flex items-center justify-center font-bold text-sm group-hover:scale-110 transition-transform">5</div>
                        <div class="ml-4 font-semibold text-slate-700 group-hover:text-rose-600 text-sm tracking-wide">LAPORAN BISNIS INTERNAT</div>
                        <i class="fa-solid fa-chevron-right ml-auto text-slate-300 group-hover:text-rose-400 transition-colors text-xs"></i>
                    </button>

                    <button onclick="selectMenu('LAPORAN REKAP SEMUA LAPORAN')" class="group flex items-center p-4 bg-slate-50 hover:bg-rose-50/50 border border-slate-200/60 hover:border-rose-200 rounded-2xl transition-all text-left cursor-pointer">
                        <div class="w-10 h-10 rounded-xl bg-emerald-500/10 text-emerald-600 flex items-center justify-center font-bold text-sm group-hover:scale-110 transition-transform">6</div>
                        <div class="ml-4 font-semibold text-slate-700 group-hover:text-rose-600 text-sm tracking-wide">LAPORAN REKAP SEMUA LAPORAN</div>
                        <i class="fa-solid fa-chevron-right ml-auto text-slate-300 group-hover:text-rose-400 transition-colors text-xs"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- ================= LOGIKA JAVASCRIPT ================= -->
    <script>
        // Data Kredensial Utama (Disimpan di variabel global / bisa diubah dinamis saat reset)
        let systemCredentials = {
            username: "Radhika",
            password: "002886",
            words: "Raisya",
            validEmail: "dedesugiono.ai@gmail.com",
            validPhone: "081220285226"
        };

        // Fungsi bantu untuk navigasi halaman antar menu
        function switchPage(pageId) {
            const pages = ['page-login', 'page-forgot', 'page-reset', 'page-menu'];
            pages.forEach(p => {
                document.getElementById(p).classList.add('hidden');
            });
            document.getElementById(pageId).classList.remove('hidden');

            // Reset pesan error setiap ganti halaman
            document.getElementById('login-error').classList.add('hidden');
            document.getElementById('forgot-error').classList.add('hidden');
            document.getElementById('reset-error').classList.add('hidden');

            // Ubah subtitle atas biar dinamis
            const subtitle = document.getElementById('app-subtitle');
            if(pageId === 'page-menu') subtitle.innerText = "Sistem Menu Utama Terbuka";
            else if(pageId === 'page-forgot') subtitle.innerText = "Proses Pemulihan Akun";
            else if(pageId === 'page-reset') subtitle.innerText = "Setel Ulang Kata Sandi";
            else subtitle.innerText = "Sistem Manajemen Laporan & Bisnis";
        }

        // Aksi Login Masuk
        function handleLogin() {
            const userInp = document.getElementById('login-user').value.trim();
            const passInp = document.getElementById('login-pass').value.trim();
            const wordInp = document.getElementById('login-words').value.trim();
            const errorDiv = document.getElementById('login-error');

            if(userInp === systemCredentials.username && 
               passInp === systemCredentials.password && 
               wordInp.toLowerCase() === systemCredentials.words.toLowerCase()) {
                switchPage('page-menu');
            } else {
                errorDiv.innerText = "Username, Password, atau Kata-Kata salah!";
                errorDiv.classList.remove('hidden');
            }
        }

        // Aksi Konfirmasi Lupa Password
        function handleForgot() {
            const forgotInp = document.getElementById('forgot-input').value.trim();
            const errorDiv = document.getElementById('forgot-error');

            if(forgotInp === systemCredentials.validEmail || forgotInp === systemCredentials.validPhone) {
                switchPage('page-reset');
            } else {
                errorDiv.innerText = "Data tidak cocok dengan rekam sistem kami!";
                errorDiv.classList.remove('hidden');
            }
        }

        // Aksi Menyimpan Password Baru
        function handleReset() {
            const newPass = document.getElementById('reset-pass').value.trim();
            const errorDiv = document.getElementById('reset-error');

            if(newPass === "") {
                errorDiv.innerText = "Password baru tidak boleh kosong!";
                errorDiv.classList.remove('hidden');
                return;
            }

            // Ganti password sistem
            systemCredentials.password = newPass;
            alert("Password berhasil diperbarui! Silakan login kembali.");
            
            // Bersihkan input dan balik ke login
            document.getElementById('login-pass').value = "";
            document.getElementById('reset-pass').value = "";
            switchPage('page-login');
        }

        // Aksi Mengetuk Menu Pilihan
        function selectMenu(menuName) {
            alert("Anda memilih: " + menuName + "\n(Fitur halaman detail laporan dapat diintegrasikan sesuai kebutuhan Anda)");
        }

        // Aksi Keluar (Logout)
        function handleLogout() {
            document.getElementById('login-user').value = "";
            document.getElementById('login-pass').value = "";
            document.getElementById('login-words').value = "";
            switchPage('page-login');
        }
    </script>
</body>
</html>
