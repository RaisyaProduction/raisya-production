<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAISYA DECORATION - Sistem Pembukuan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-blue-800 text-white p-4 text-center shadow-lg">
        <h1 class="text-2xl font-bold">RAISYA DECORATION</h1>
    </header>

    <main id="app" class="container mx-auto p-4">
        <div id="login-section" class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-center" id="login-title">Login Admin</h2>
            <input type="text" id="username" placeholder="Username" class="w-full p-2 mb-3 border rounded">
            <input type="password" id="password" placeholder="Password" class="w-full p-2 mb-3 border rounded">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white p-2 rounded">Masuk</button>
            <p class="mt-4 text-sm text-center">
                Lupa password? Hubungi: <br> 
                Email: dedesugiono.ai@gmail.com <br> 
                WA: 081220285226
            </p>
        </div>

        <div id="dashboard-section" class="hidden">
            <h2 class="text-xl mb-4">Pilih Menu Utama:</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button onclick="loadModule('keuangan-keluarga')" class="bg-green-600 text-white p-6 rounded">1. KEUANGAN KELUARGA</button>
                <button onclick="loadModule('rumah-hantu')" class="bg-red-600 text-white p-6 rounded">2. BISNIS RUMAH HANTU</button>
                <button onclick="loadModule('playground')" class="bg-yellow-600 text-white p-6 rounded">3. BISNIS PLAYGROUND</button>
                <button onclick="loadModule('raisya-dec')" class="bg-pink-600 text-white p-6 rounded">4. RAISYA DECORATION</button>
                <button onclick="loadModule('internet')" class="bg-purple-600 text-white p-6 rounded">5. BISNIS INTERNET</button>
                <button onclick="loadModule('rekap')" class="bg-gray-800 text-white p-6 rounded">6. REKAPITULASI ALL</button>
            </div>
        </div>
    </main>

    <script>
        // Logika Sederhana untuk Login
        const credentials = {
            "Radhika": "002886",
            "Suami/Istri": "002886",
            "RumahHantu": "002886",
            "Playground": "002886",
            "RaisyaDecoration": "002886",
            "Internet": "002886"
        };

        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (credentials[u] === p) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
            } else {
                alert("Username atau Password Salah!");
            }
        }

        // Fungsi Ekspor Excel
        function exportToExcel(tableId, filename) {
            const table = document.getElementById(tableId);
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, filename + ".xlsx");
        }
    </script>
</body>
</html>
